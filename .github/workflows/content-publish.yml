name: Content Publish
on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * 1'
jobs:
  publish-approved-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/publish_approved_content.js
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: publish approved dental resources"
          title: "Publish approved dental resources"
          body: "Build output refreshed after approved/date-gated resource review."
          branch: "automation/publish-approved-resources"
          delete-branch: true
