name: Social Query Ingestion Legacy Alias
on:
  workflow_dispatch:
jobs:
  query-briefs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run ingest:queries
      - run: npm run build
      - run: npm run validate:all
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh dental query briefs"
          title: "Refresh dental query briefs"
          body: "Legacy alias for monthly query intelligence. Review before merge."
          branch: "automation/dental-query-briefs"
          delete-branch: true
